name: Deploy to Railway (Develop)

# 1. Trigger: Solo reacciona a pushes en la rama 'develop'
on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Configurar Java 17 con caché para compilar más rápido
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Dar permisos y Compilar el proyecto con Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test # Omitimos tests por velocidad

      # 4. Instalar la herramienta de Railway
      - name: Install Railway CLI
        run: npm i -g @railway/cli

      # 5. Desplegar usando el token secreto
      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}