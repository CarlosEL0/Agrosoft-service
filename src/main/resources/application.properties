# ==========================================
# CONFIGURACI”N BASE DE LA APLICACI”N
# ==========================================
spring.application.name=AgroSoft
spring.profiles.active=${APP_ENV:dev}

# Zona horaria unificada para evitar problemas de fechas con PostgreSQL
spring.jackson.time-zone=UTC

# Habilitar Virtual Threads (Mejora masiva de rendimiento para I/O)
spring.threads.virtual.enabled=true

# ==========================================
# CONFIGURACI”N DE ARCHIVOS
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# CONFIGURACI”N DE BASE DE DATOS
# ==========================================
spring.datasource.driver-class-name=org.postgresql.Driver
# Desactivar OSIV (AntipatrÛn) para liberar conexiones a la BD r·pidamente
spring.jpa.open-in-view=false