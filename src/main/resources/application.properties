spring.application.name=AgroSoft

# ==========================================
# CONFIGURACIÆN DE BASE DE DATOS
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5434/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURACIÆN DE HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ==========================================
# CONFIGURACIÆN DE INTELIGENCIA ARTIFICIAL (GROQ)
# ==========================================
groq.api.url=https://api.groq.com/openai/v1
groq.api.key=${GROQ_API_KEY}
groq.model=llama-3.1-8b-instant